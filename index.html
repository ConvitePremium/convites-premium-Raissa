<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Raissa - 15 anos</title>
  <meta name="description" content="Clique para abrir o convite." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Raissa - 15 anos" />
  <meta property="og:description" content="Clique para abrir o convite." />
  <meta property="og:image" content="https://convitepremium.github.io/raissa-15/assets/preview.webp" />
  <meta property="og:image:width" content="1729" />
  <meta property="og:image:height" content="910" />
  <meta property="og:url" content="https://convitepremium.github.io/raissa-15/" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="theme-color" content="#02030c" />
  <link rel="preload" href="assets/principal.webp" as="image" />
  <link rel="preload" href="assets/presentes.webp" as="image" />
  <style>
    *{box-sizing:border-box} html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#02030c;font-family:Arial,Helvetica,sans-serif;color:white;touch-action:manipulation} 
    body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 50% 10%,rgba(43,73,137,.25),transparent 45%),linear-gradient(180deg,#02030c,#09030e 75%);z-index:-3}
    .screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#02030c;transition:opacity .55s ease, visibility .55s ease}.hidden{opacity:0;visibility:hidden;pointer-events:none}
    #start{z-index:20;background-image:linear-gradient(rgba(2,3,12,.55),rgba(2,3,12,.88)),url('assets/preview.webp');background-size:cover;background-position:center}
    .start-card{text-align:center;padding:34px 28px;width:min(92vw,470px);border:1px solid rgba(255,213,125,.22);border-radius:28px;background:rgba(0,0,0,.34);backdrop-filter:blur(8px);box-shadow:0 22px 70px rgba(0,0,0,.6)}
    .tag{letter-spacing:.42em;color:#f4c96c;font-size:12px;font-weight:700;margin-bottom:18px}.title{font-size:clamp(44px,11vw,78px);font-weight:900;line-height:.9;margin:0 0 14px}.subtitle{font-size:18px;opacity:.9;margin:0 0 26px}
    .btn{border:0;border-radius:999px;padding:18px 34px;font-size:22px;font-weight:900;color:#130a02;background:linear-gradient(135deg,#fff0a6,#c78a18);box-shadow:0 18px 48px rgba(220,154,38,.35);cursor:pointer}
    #videoScreen{z-index:15;background:#000}.video{height:100dvh;width:100vw;object-fit:contain;background:#000}.skip{position:fixed;right:14px;bottom:18px;z-index:16;border:1px solid rgba(255,255,255,.22);border-radius:999px;background:rgba(0,0,0,.45);color:white;padding:11px 16px;font-weight:700}
    #main,#gift{z-index:5;background:#000}.stage{position:relative;height:100dvh;width:100vw;display:flex;align-items:center;justify-content:center;background:#000}.art{max-width:100vw;max-height:100dvh;width:auto;height:auto;display:block;user-select:none;-webkit-user-drag:none}.artWrap{position:relative;display:inline-block;line-height:0;max-width:100vw;max-height:100dvh}
    .hotspot{position:absolute;border:0;background:rgba(255,255,255,0);cursor:pointer;border-radius:18px}.hotspot.debug{background:rgba(0,255,120,.25);outline:2px solid rgba(0,255,120,.95)}
    .back{position:absolute;right:3.5%;top:2.2%;width:14%;height:8%;border-radius:999px;background:rgba(255,255,255,0);border:0;cursor:pointer}.back.debug{background:rgba(255,0,100,.28);outline:2px solid #ff4b9e}
    .loader{position:fixed;inset:0;z-index:30;background:#02030c;display:none;align-items:center;justify-content:center;text-align:center}.loader.show{display:flex}.spark{font-size:42px;animation:pulse 1.1s infinite alternate}.loader p{color:#f5d37b;font-weight:700;letter-spacing:.12em}@keyframes pulse{to{transform:scale(1.16);opacity:.65}}
  </style>
</head>
<body>
  <audio id="music" src="assets/musica.mp3" loop preload="auto"></audio>
  <section id="start" class="screen">
    <div class="start-card">
      <div class="tag">CONVITE PREMIUM</div>
      <h1 class="title">Raissa</h1>
      <p class="subtitle">Toque para iniciar a experiência</p>
      <button id="startBtn" class="btn">Iniciar convite</button>
    </div>
  </section>
  <section id="videoScreen" class="screen hidden">
    <video id="introVideo" class="video" src="assets/video.mp4" playsinline webkit-playsinline preload="auto"></video>
    <button id="skipBtn" class="skip">Pular</button>
  </section>
  <section id="main" class="screen hidden">
    <div class="stage"><div class="artWrap" id="mainWrap"><img id="mainImg" class="art" src="assets/principal.webp" alt="Convite Raissa 15 anos">
      <button class="hotspot" id="btnWhatsapp" aria-label="Confirmar presença"></button>
      <button class="hotspot" id="btnMaps" aria-label="Localização"></button>
      <button class="hotspot" id="btnGifts" aria-label="Sugestões de presentes"></button>
    </div></div>
  </section>
  <section id="gift" class="screen hidden">
    <div class="stage"><div class="artWrap" id="giftWrap"><img class="art" src="assets/presentes.webp" alt="Sugestões de presentes"><button id="backBtn" class="back" aria-label="Voltar"></button></div></div>
  </section>
  <div id="loader" class="loader"><div><div class="spark">✨</div><p>PREPARANDO CONVITE</p></div></div>
  <script>
    const DEBUG = new URLSearchParams(location.search).has('debug');
    const $ = id => document.getElementById(id);
    const start=$('start'), videoScreen=$('videoScreen'), main=$('main'), gift=$('gift'), music=$('music'), video=$('introVideo'), loader=$('loader');
    const whatsapp = 'https://wa.me/5512997025864?text=' + encodeURIComponent('Olá! Confirmo minha presença no aniversário de 15 anos da Raissa.');
    const maps = 'https://www.google.com/maps/place/Analema+-+Eventos/@-23.4279878,-45.0647461,3a,75y,117.86h,95.41t/data=!3m7!1e1!3m5!1sL8iJAexMkjZ4qlPbdI5BIQ!2e0!6shttps:%2F%2Fstreetviewpixels-pa.googleapis.com%2Fv1%2Fthumbnail%3Fcb_client%3Dmaps_sv.tactile%26w%3D900%26h%3D600%26pitch%3D-5.408324196819009%26panoid%3DL8iJAexMkjZ4qlPbdI5BIQ%26yaw%3D117.8553692609158!7i16384!8i8192!4m14!1m7!3m6!1s0x94cd5396d23395ad:0xc5470688b349f7d6!2sAnalema+-+Eventos!8m2!3d-23.4280962!4d-45.0644771!16s%2Fg%2F11t9h8lks1!3m5!1s0x94cd5396d23395ad:0xc5470688b349f7d6!8m2!3d-23.4280962!4d-45.0644771!16s%2Fg%2F11t9h8lks1?entry=ttu&g_ep=EgoyMDI2MDYyMi4wIKXMDSoASAFQAw%3D%3D';
    function show(el){[start,videoScreen,main,gift].forEach(s=>s.classList.add('hidden')); el.classList.remove('hidden')}
    async function goFullscreen(){try{ if(document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen(); }catch(e){}}
    $('startBtn').onclick = async () => { loader.classList.add('show'); await goFullscreen(); try{ music.volume=.82; await music.play(); }catch(e){} loader.classList.remove('show'); show(videoScreen); try{ video.currentTime=0; await video.play(); }catch(e){ show(main); } };
    video.addEventListener('ended',()=>show(main)); $('skipBtn').onclick=()=>{video.pause(); show(main)};
    $('btnWhatsapp').onclick=()=> window.open(whatsapp,'_blank');
    $('btnMaps').onclick=()=> window.open(maps,'_blank');
    $('btnGifts').onclick=()=> show(gift);
    $('backBtn').onclick=()=> show(main);
    function placeHotspots(){
      const img=$('mainImg'); const w=img.clientWidth, h=img.clientHeight;
      // posições em porcentagem da imagem principal
      const spots=[
        ['btnWhatsapp', 13, 60.5, 23, 11],
        ['btnMaps', 38.5, 60.5, 23, 11],
        ['btnGifts', 64, 60.5, 25, 11]
      ];
      spots.forEach(([id,x,y,ww,hh])=>{const el=$(id); el.style.left=x+'%';el.style.top=y+'%';el.style.width=ww+'%';el.style.height=hh+'%'; if(DEBUG) el.classList.add('debug')});
      if(DEBUG) $('backBtn').classList.add('debug');
    }
    window.addEventListener('load', placeHotspots); window.addEventListener('resize', placeHotspots); setTimeout(placeHotspots,500);
  </script>
</body>
</html>
